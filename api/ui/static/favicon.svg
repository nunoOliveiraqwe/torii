  <!-- Second beam (nuki) -->
  <rect x="10" y="20" width="44" height="4" rx="1" fill="#e74c3c"/>
  <!-- Left pillar (hashira) -->
  <rect x="14" y="16" width="5" height="42" rx="1" fill="#e74c3c"/>
  <!-- Right pillar (hashira) -->
  <rect x="45" y="16" width="5" height="42" rx="1" fill="#e74c3c"/>
  <!-- Pillar feet -->
  <rect x="11" y="56" width="11" height="3" rx="1" fill="#e74c3c"/>
  <rect x="42" y="56" width="11" height="3" rx="1" fill="#e74c3c"/>
</svg>


