{{define "base"}}<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>microProxy{{block "title" .}}{{end}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
    <style>
        :root { --pico-font-size: 16px; }
        .badge {
            display: inline-block;
            padding: 0.15em 0.55em;
            border-radius: 0.25em;
            font-size: 0.8em;
            font-weight: 600;
            white-space: nowrap;
        }
        .badge-success { background-color: #2ecc71; color: #1a1a2e; }
        .badge-danger  { background-color: #e74c3c; color: #fff; }
        .badge-info    { background-color: #3498db; color: #fff; }
        .badge-muted   { background-color: #6c757d; color: #fff; }
        .text-center   { text-align: center; }
        .brand         { font-weight: 700; font-size: 1.25rem; }
        .mt-1          { margin-top: 1rem; }
        .auth-container { max-width: 420px; margin: 4rem auto; border-radius: 10px; }
        .error-alert {
            background-color: rgba(231, 76, 60, 0.15);
            border: 1px solid #e74c3c;
            border-radius: 0.35rem;
            color: #e74c3c;
            padding: 0.75rem 1rem;
            margin-top: 0.75rem;
            font-size: 0.9em;
        }
        .overflow-auto { overflow-x: auto; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }

        /* Dashboard grid & cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
            border-radius: 0.5rem;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #7c6ef0;
            margin: 0;
        }
        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--pico-muted-color);
            margin: 0.25rem 0 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .chart-container {
            position: relative;
            background: var(--pico-card-background-color);
            border: 1px solid var(--pico-muted-border-color);
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .chart-header h4 { margin: 0; }
        .chart-header select {
            width: auto;
            min-width: 180px;
            margin: 0;
            padding: 0.35rem 0.75rem;
            font-size: 0.85rem;
        }
    </style>
    {{block "head" .}}{{end}}
</head>
<body>
    {{block "body" .}}{{end}}
    <script>
        // Shared response handler for forms that POST to the JSON API.
        // successUrl – where to redirect on 2xx.
        // fallbackUrl – (optional) redirect here on 401 (used by the
        //   setup form where a 401 is expected because the API's
        //   internal auto-login attempt fails after FTS completion).
        function onApiResponse(evt, successUrl, fallbackUrl) {
            var xhr = evt.detail.xhr;
            var el  = document.getElementById('result');
            if (xhr.status >= 200 && xhr.status < 300) {
                window.location.href = successUrl;
            } else if (fallbackUrl && xhr.status === 401) {
                window.location.href = fallbackUrl;
            } else {
                var msg = xhr.responseText ? xhr.responseText.trim() : 'An error occurred';
                el.innerHTML = '<div class=\"error-alert\" role=\"alert\">' + msg + '</div>';
            }
        }
    </script>
</body>
</html>{{end}}
