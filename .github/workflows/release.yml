name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            deb_arch: amd64
          - goos: linux
            goarch: arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # arm64 cross-compilation needs a cross-compiler
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
          fi

          go build \
            -ldflags="-s -w \
              -X 'github.com/nunoOliveiraqwe/torii.Version=${VERSION}' \
              -X 'github.com/nunoOliveiraqwe/torii.Build=${GITHUB_SHA::8}' \
              -X 'github.com/nunoOliveiraqwe/torii.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)' \
              -linkmode external -extldflags '-static'" \
            -o torii-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/torii

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: torii-${{ matrix.goos }}-${{ matrix.goarch }}
          path: torii-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  package-deb:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            deb_arch: amd64
          - goos: linux
            goarch: arm64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: torii-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Build .deb package
        run: |
          chmod +x torii-${{ matrix.goos }}-${{ matrix.goarch }}
          ./package/os_debian/build-deb.sh \
            --binary torii-${{ matrix.goos }}-${{ matrix.goarch }} \
            --version "$VERSION" \
            --arch ${{ matrix.deb_arch }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: torii_${{ env.VERSION }}_${{ matrix.deb_arch }}.deb
          path: package/os_debian/build/torii_${{ env.VERSION }}_${{ matrix.deb_arch }}.deb


  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: torii-linux-amd64
          path: docker/

      - name: Prepare binary for Docker
        run: chmod +x docker/torii-linux-amd64 && mv docker/torii-linux-amd64 docker/torii

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest


  release:
    runs-on: ubuntu-latest
    needs: [package-deb, docker]
    steps:
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download all .deb packages
        uses: actions/download-artifact@v4
        with:
          pattern: "*.deb"
          path: artifacts/
          merge-multiple: true

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: torii-linux-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

